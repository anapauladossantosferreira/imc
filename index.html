<!DOCTYPE html>
<!-- Define o tipo de documento como HTML5 -->
<html lang="pt-BR">
<!-- Define o idioma da página como português do Brasil -->

<head>
    <!-- Cabeçalho da página -->
    <meta charset="UTF-8">
    <!-- Define a codificação de caracteres como UTF-8 (suporta acentos) -->
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Torna a página responsiva em celulares e tablets -->
    
    <title>Calculadora de IMC</title>
    <!-- Título que aparece na aba do navegador -->
    
    <!-- Link para o arquivo de estilos externo -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Corpo da página -->
    
    <div class="container">
        <!-- Container principal que centraliza o conteúdo -->

        <header>
            <!-- Cabeçalho da calculadora -->
            <h1>🧮 Calculadora de IMC</h1>
            <!-- Título principal -->
            <p>Índice de Massa Corporal</p>
            <!-- Subtítulo -->
        </header>

        <!-- Grupo de campo para peso -->
        <div class="form-group">
            <label for="peso">Peso (kg):</label>
            <!-- Label do campo de peso -->
            <input type="number" id="peso" step="0.1" min="1" placeholder="Ex: 75">
            <!-- Campo de entrada numérico para peso -->
        </div>

        <!-- Grupo de campo para altura -->
        <div class="form-group">
            <label for="altura">Altura (metros):</label>
            <!-- Label do campo de altura -->
            <input type="number" id="altura" step="0.01" min="0.5" max="2.5" placeholder="Ex: 1.75">
            <!-- Campo de entrada numérico para altura -->
        </div>

        <!-- Botão para calcular -->
        <button onclick="calcularIMC()">Calcular IMC</button>

        <!-- Área onde aparece o resultado -->
        <div id="resultado" class="resultado" style="display: none;"></div>

        <!-- Área de preview enquanto o usuário digita -->
        <div id="preview" class="preview" style="display: none;"></div>

        <!-- Seção de histórico -->
        <div class="historico">
            <h3>📖 Histórico de Cálculos</h3>
            <!-- Título da seção de histórico -->
            <ul id="lista-historico"></ul>
            <!-- Lista onde os cálculos anteriores serão exibidos -->
        </div>

    </div>

    <!-- Link para o arquivo JavaScript externo -->
    <script src="script.js"></script>
</body>
</html>
